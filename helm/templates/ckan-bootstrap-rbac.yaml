{{- if .Values.ckanBootstrap.enabled }}
# ServiceAccount, Role, and RoleBinding for the CKAN API token bootstrap Job.
# Hooks run before the Job (weight -5) so they exist when the Job (weight 0) starts.
# Using before-hook-creation delete policy so they are cleaned up on re-runs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ckan-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ckan-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  # List/watch pods to find the CKAN pod
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Exec into the CKAN pod to run ckan CLI commands
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Read and patch the env Secret (CKAN_API_KEY) and the sysadmin token Secret
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
  # Find and patch (rollout restart) the ndp-ep-api Deployment
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ckan-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ckan-bootstrap
subjects:
  - kind: ServiceAccount
    name: ckan-bootstrap
    namespace: {{ .Release.Namespace }}
{{- end }}
