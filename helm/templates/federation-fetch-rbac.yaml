{{- if .Values.federation.configId }}
# ServiceAccount, Role, and RoleBinding for the federation-config pre-install Job.
# The Job fetches the endpoint configuration from the Federation API and writes it
# into in-cluster resources before the main chart resources are created.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: federation-fetch
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: federation-fetch
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  # Write federation-config ConfigMap (EP API env vars)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "update", "patch"]
  # Write jupyterhub-secret (OAuth client_id / client_secret / callback URLs)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: federation-fetch
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: federation-fetch
subjects:
  - kind: ServiceAccount
    name: federation-fetch
    namespace: {{ .Release.Namespace }}
{{- end }}
